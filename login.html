<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Intranet · Iniciar sesión</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F2EA;
    --paper:#FCFAF6;
    --ink:#241F1B;
    --ink-soft:#5A5249;
    --green:#1F4B3B;
    --green-soft:#E7EFE9;
    --red:#8F2A2A;
    --red-soft:#F7E9E7;
    --line:#DCD4C6;
    --shadow: 0 1px 2px rgba(36,31,27,0.06), 0 8px 24px rgba(36,31,27,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    max-width:380px;
    width:100%;
    padding:32px 28px;
  }
  .page-title{text-align:center;margin-bottom:24px;}
  .page-title h1{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:26px;
    color:var(--ink);
    margin:0;
  }
  form{display:flex;flex-direction:column;gap:14px;margin-top:10px;}
  .field label{
    display:block;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    outline:none;
    background:#fff;
    color:var(--ink);
  }
  .field input:focus{border-color:var(--green);}
  button[type="submit"]{
    margin-top:4px;
    border:none;
    background:var(--green);
    color:#fff;
    border-radius:8px;
    padding:11px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:15px;
    cursor:pointer;
    transition:opacity .15s;
  }
  button[type="submit"]:disabled{opacity:0.6;cursor:not-allowed;}
  .login-status{
    min-height:18px;
    text-align:center;
    font-size:13px;
    color:var(--red);
  }
  .login-status.ok{color:var(--green);}
  .footer-note{
    text-align:center;
    margin-top:18px;
    font-size:11.5px;
    color:var(--ink-soft);
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="page-title">
      <h1>ACCESO INTRANET</h1>
    </div>
    <form id="loginForm">
      <div class="field">
        <label for="email">CORREO</label>
        <input type="email" id="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">CONTRASEÑA</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="login-status" id="loginStatus"></div>
      <button type="submit" id="btnLogin">Iniciar sesión</button>
    </form>
    <div class="footer-note">Acceso restringido al personal autorizado</div>
  </div>

<!-- Firebase SDK (versión "compat", API clásica con firebase.xxx) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ==========================================================================
   CONFIGURACIÓN DE FIREBASE — mismo proyecto que el resto de páginas.
   ========================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyC2YAldQ3Ple_ZFN9rr74B6XXFjTFwkzYM",
  authDomain: "checklist-830bc.firebaseapp.com",
  projectId: "checklist-830bc",
  storageBucket: "checklist-830bc.firebasestorage.app",
  messagingSenderId: "1041357310906",
  appId: "1:1041357310906:web:721e48a5430a00cee96b83"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const form = document.getElementById('loginForm');
const btnLogin = document.getElementById('btnLogin');

function setStatus(msg, ok){
  const el = document.getElementById('loginStatus');
  el.textContent = msg;
  el.classList.toggle('ok', !!ok);
}

function friendlyError(err){
  const map = {
    'auth/invalid-email': 'Correo electrónico no válido.',
    'auth/user-disabled': 'Esta cuenta ha sido deshabilitada.',
    'auth/user-not-found': 'No existe ninguna cuenta con ese correo.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/too-many-requests': 'Demasiados intentos. Inténtalo más tarde.',
    'auth/network-request-failed': 'Error de conexión. Comprueba tu red.'
  };
  return map[err.code] || 'No se pudo iniciar sesión. Inténtalo de nuevo.';
}

// Si ya hay una sesión válida y activa, saltar directo a la intranet.
auth.onAuthStateChanged(async (user)=>{
  if(!user) return;
  try{
    const snap = await db.collection('usuarios').doc(user.uid).get();
    if(snap.exists && snap.data().activo === true){
      goToApp();
    }
  }catch(e){
    console.error(e);
  }
});

let redirected = false;
function goToApp(){
  if(redirected) return;
  redirected = true;
  window.location.href = 'index.html';
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btnLogin.disabled = true;
  setStatus('Iniciando sesión...', false);

  try{
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const uid = cred.user.uid;
    const snap = await db.collection('usuarios').doc(uid).get();

    if(!snap.exists){
      await auth.signOut();
      setStatus('Tu usuario no está registrado. Contacta con el administrador.', false);
      btnLogin.disabled = false;
      return;
    }
    if(snap.data().activo !== true){
      await auth.signOut();
      setStatus('Tu cuenta está desactivada. Contacta con el administrador.', false);
      btnLogin.disabled = false;
      return;
    }

    setStatus('Acceso correcto, entrando...', true);
    goToApp();
  }catch(err){
    console.error(err);
    setStatus(friendlyError(err), false);
    btnLogin.disabled = false;
  }
});
</script>
</body>
</html>
