<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Guaracha · Usuarios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F2EA;
    --paper:#FCFAF6;
    --ink:#241F1B;
    --ink-soft:#5A5249;
    --green:#1F4B3B;
    --green-soft:#E7EFE9;
    --amber:#C98A1F;
    --amber-soft:#FBF0DD;
    --red:#8F2A2A;
    --red-soft:#F7E9E7;
    --line:#DCD4C6;
    --shadow: 0 1px 2px rgba(36,31,27,0.06), 0 8px 24px rgba(36,31,27,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:24px 16px 80px;
  }
  .wrap{max-width:980px;margin:0 auto;}

  .brand{text-align:center;padding:8px 0 20px;}
  .brand .eyebrow{font-family:'Bebas Neue',sans-serif;letter-spacing:0.35em;font-size:15px;color:var(--ink-soft);}
  .brand h1{font-family:'Dancing Script',cursive;font-weight:700;font-size:64px;margin:2px 0 6px;color:var(--ink);line-height:1;}
  .brand .est{font-family:'Bebas Neue',sans-serif;letter-spacing:0.3em;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:14px;}
  .brand .est::before,.brand .est::after{content:'';height:1px;width:60px;background:var(--line);}

  .nav{display:flex;justify-content:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
  .nav a{font-family:'Bebas Neue',sans-serif;letter-spacing:0.08em;font-size:13px;text-decoration:none;color:var(--ink-soft);border:1px solid var(--line);background:var(--paper);padding:7px 14px;border-radius:999px;}
  .nav a.active{background:var(--green);color:#fff;border-color:var(--green);}

  .user-bar{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:18px;font-size:12px;color:var(--ink-soft);}
  .user-bar button{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);font-family:'Inter',sans-serif;font-size:12px;padding:4px 10px;border-radius:999px;cursor:pointer;}
  .user-bar button:hover{background:var(--red-soft);color:var(--red);border-color:var(--red);}

  .status{font-size:12px;color:var(--ink-soft);text-align:center;margin-bottom:14px;min-height:14px;}

  .add-user{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:18px 20px;
    margin-bottom:22px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:flex-end;
  }
  .add-user .field{display:flex;flex-direction:column;gap:5px;}
  .add-user label{font-family:'Bebas Neue',sans-serif;letter-spacing:0.06em;font-size:11.5px;color:var(--ink-soft);}
  .add-user input, .add-user select{
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    outline:none;
    background:#fff;
  }
  .add-user input:focus, .add-user select:focus{border-color:var(--green);}
  .add-user button{
    border:1px solid var(--green);
    background:var(--green);
    color:#fff;
    border-radius:8px;
    padding:9px 18px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.05em;
    font-size:14px;
    cursor:pointer;
  }

  .table-wrap{
    overflow-x:auto;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
  }
  table.users{border-collapse:collapse;width:100%;min-width:680px;}
  table.users th, table.users td{border:1px solid var(--line);padding:10px 12px;font-size:14px;text-align:left;vertical-align:middle;}
  table.users thead th{background:var(--green);color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;font-size:13px;}
  table.users select{
    border:1px solid var(--line);
    border-radius:6px;
    padding:5px 7px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:#fff;
  }
  .toggle-activo{
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 12px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.05em;
    font-size:12px;
    cursor:pointer;
  }
  .toggle-activo.on{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .toggle-activo.off{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  .reset-btn{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    border-radius:6px;
    padding:5px 9px;
    font-size:12px;
    cursor:pointer;
  }
  .reset-btn:hover{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:14px;}

  .footer-brand{text-align:center;margin-top:34px;color:var(--ink-soft);}
  .footer-brand .line{display:flex;align-items:center;justify-content:center;gap:16px;}
  .footer-brand .line::before,.footer-brand .line::after{content:'';height:1px;width:100px;background:var(--line);}
  .footer-brand small{font-family:'Bebas Neue',sans-serif;letter-spacing:0.3em;font-size:11px;}
  .footer-brand .script{font-family:'Dancing Script',cursive;font-size:28px;font-weight:700;color:var(--ink);margin:4px 0;}

  .auth-checking{
    display:none;
    min-height:100vh;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-size:15px;
  }
  body.checking-auth .auth-checking{display:flex;}
  body.checking-auth .wrap{display:none;}
</style>
</head>
<body class="checking-auth">
<div class="auth-checking" id="authChecking">Comprobando sesión...</div>
<div class="wrap">

  <div class="nav">
    <a href="index.html">📋 Tareas de cocina</a>
    <a href="compra.html">🛒 Lista de la compra</a>
    <a href="horario.html">🗓 Horario de personal</a>
    <a href="proveedores.html">🏢 Proveedores</a>
    <a href="usuarios.html" class="active">👥 Usuarios</a>
  </div>

  <div class="user-bar">
    <span id="userEmailLabel"></span>
    <button id="btnLogout">🚪 Salir</button>
  </div>

  <div class="brand">
    <div class="eyebrow">BAR RESTAURANTE</div>
    <h1>la guaracha</h1>
    <div class="est">ADMINISTRACIÓN DE USUARIOS</div>
  </div>

  <div class="status" id="status"></div>

  <div class="add-user">
    <div class="field">
      <label>NOMBRE</label>
      <input type="text" id="newNombre" placeholder="Nombre y apellidos">
    </div>
    <div class="field">
      <label>CORREO</label>
      <input type="email" id="newEmail" placeholder="correo@ejemplo.com">
    </div>
    <div class="field">
      <label>CONTRASEÑA TEMPORAL</label>
      <input type="text" id="newPassword" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>ROL</label>
      <select id="newRol">
        <option value="empleado">Empleado</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button id="btnCreateUser">+ Crear usuario</button>
  </div>

  <div class="table-wrap">
    <table class="users">
      <thead>
        <tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">Todavía no hay usuarios registrados.</div>
  </div>

  <div class="footer-brand">
    <div class="line"></div>
    <div class="script">la guaracha</div>
    <small>EST. 2025</small>
  </div>
</div>

<!-- Firebase SDK (versión "compat", API clásica con firebase.xxx) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2YAldQ3Ple_ZFN9rr74B6XXFjTFwkzYM",
  authDomain: "checklist-830bc.firebaseapp.com",
  projectId: "checklist-830bc",
  storageBucket: "checklist-830bc.firebasestorage.app",
  messagingSenderId: "1041357310906",
  appId: "1:1041357310906:web:721e48a5430a00cee96b83"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function setStatus(msg, timeout=2500){
  const el = document.getElementById('status');
  el.textContent = msg;
  if(timeout){
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.textContent=''; }, timeout);
  }
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

/* ---------- Alta de usuario (app Firebase secundaria para no cerrar la sesión del admin) ---------- */
async function createUser(nombre, email, password, rol){
  const secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary-' + Date.now());
  const secondaryAuth = secondaryApp.auth();
  try{
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;
    await db.collection('usuarios').doc(uid).set({
      nombre: nombre || '',
      email,
      rol: rol === 'admin' ? 'admin' : 'empleado',
      activo: true,
      creadoEn: new Date().toISOString()
    });
    await secondaryAuth.signOut();
  } finally {
    await secondaryApp.delete();
  }
}

document.getElementById('btnCreateUser').addEventListener('click', async ()=>{
  const nombre = document.getElementById('newNombre').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('newPassword').value;
  const rol = document.getElementById('newRol').value;

  if(!email || !password){
    setStatus('Correo y contraseña son obligatorios', 3000);
    return;
  }
  if(password.length < 6){
    setStatus('La contraseña debe tener al menos 6 caracteres', 3000);
    return;
  }

  const btn = document.getElementById('btnCreateUser');
  btn.disabled = true;
  setStatus('Creando usuario...', 0);
  try{
    await createUser(nombre, email, password, rol);
    document.getElementById('newNombre').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newRol').value = 'empleado';
    setStatus('Usuario creado ✓ — comparte la contraseña temporal con el trabajador', 4000);
  }catch(err){
    console.error(err);
    const map = {
      'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
      'auth/invalid-email': 'Correo electrónico no válido.',
      'auth/weak-password': 'La contraseña es demasiado débil.'
    };
    setStatus(map[err.code] || 'No se pudo crear el usuario.', 4000);
  }finally{
    btn.disabled = false;
  }
});

/* ---------- Listado en tiempo real ---------- */
function renderUsers(docs){
  const tbody = document.getElementById('usersBody');
  tbody.innerHTML = '';
  document.getElementById('emptyState').style.display = docs.length ? 'none' : 'block';

  docs.forEach(({ id, data })=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(data.nombre)}</td>
      <td>${escapeHtml(data.email)}</td>
      <td>
        <select class="rol-select">
          <option value="empleado" ${data.rol!=='admin'?'selected':''}>Empleado</option>
          <option value="admin" ${data.rol==='admin'?'selected':''}>Admin</option>
        </select>
      </td>
      <td>
        <button type="button" class="toggle-activo ${data.activo?'on':'off'}">${data.activo?'Activo':'Inactivo'}</button>
      </td>
      <td>
        <button type="button" class="reset-btn">🔑 Reset contraseña</button>
      </td>
    `;
    tbody.appendChild(tr);

    tr.querySelector('.rol-select').addEventListener('change', async (e)=>{
      try{
        await db.collection('usuarios').doc(id).update({ rol: e.target.value });
        setStatus('Rol actualizado ✓');
      }catch(err){ console.error(err); setStatus('No se pudo actualizar el rol', 3000); }
    });

    tr.querySelector('.toggle-activo').addEventListener('click', async (e)=>{
      try{
        await db.collection('usuarios').doc(id).update({ activo: !data.activo });
        setStatus(!data.activo ? 'Usuario activado ✓' : 'Usuario desactivado ✓');
      }catch(err){ console.error(err); setStatus('No se pudo actualizar', 3000); }
    });

    tr.querySelector('.reset-btn').addEventListener('click', async ()=>{
      try{
        await auth.sendPasswordResetEmail(data.email);
        setStatus(`Correo de restablecimiento enviado a ${data.email} ✓`, 4000);
      }catch(err){ console.error(err); setStatus('No se pudo enviar el correo de restablecimiento', 3000); }
    });
  });
}

db.collection('usuarios').onSnapshot((snap)=>{
  const docs = [];
  snap.forEach(doc=> docs.push({ id: doc.id, data: doc.data() }));
  docs.sort((a,b)=> (a.data.email||'').localeCompare(b.data.email||''));
  renderUsers(docs);
}, (err)=>{
  console.error(err);
  setStatus('Error al cargar usuarios', 5000);
});

/* ---------- Guard de sesión: exige login + usuario activo + rol admin ---------- */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    window.location.href = 'login.html';
    return;
  }
  try{
    const snap = await db.collection('usuarios').doc(user.uid).get();
    if(!snap.exists || snap.data().activo !== true){
      await auth.signOut();
      window.location.href = 'login.html';
      return;
    }
    if(snap.data().rol !== 'admin'){
      window.location.href = 'index.html';
      return;
    }
    document.getElementById('userEmailLabel').textContent = user.email || '';
    document.body.classList.remove('checking-auth');
  }catch(e){
    console.error(e);
    window.location.href = 'login.html';
  }
});

document.getElementById('btnLogout').addEventListener('click', async ()=>{
  await auth.signOut();
  window.location.href = 'login.html';
});
</script>
</body>
</html>
