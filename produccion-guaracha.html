<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Intranet · Producción La Guaracha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .wrap{max-width:1180px;}

  /* INFO BAR */
  .infobar{
    display:grid;
    grid-template-columns:1.1fr 1fr 1.2fr;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:22px;
  }
  .infobar .cell{
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    border-right:1px solid var(--line);
  }
  .infobar .cell:last-child{border-right:none;}
  .infobar label{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    font-size:14px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .infobar input{
    border:none;
    border-bottom:1px solid var(--line);
    background:transparent;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    padding:4px 2px;
    width:100%;
    outline:none;
  }
  .infobar input:focus{border-bottom-color:var(--ink);}
  .date-fields{display:flex;gap:6px;}
  .date-fields input{width:44px;text-align:center;}
  .date-fields input.yr{width:64px;}

  /* COLUMNS */
  .columns{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
  }
  .col{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .col-head{
    padding:16px 18px 14px;
    color:#fff;
  }
  .col.green .col-head{background:var(--green);}
  .col.amber .col-head{background:var(--amber);}
  .col.red .col-head{background:var(--red);}
  .col-head h2{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.04em;
    font-size:24px;
    margin:0 0 3px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .col-head p{
    margin:0;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    opacity:0.88;
    font-weight:600;
  }
  .items{
    padding:10px 16px 6px;
    flex:1;
  }
  .item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    position:relative;
  }
  .item:last-child{border-bottom:none;}
  .chk{
    appearance:none;
    -webkit-appearance:none;
    width:19px;
    height:19px;
    min-width:19px;
    border-radius:4px;
    border:2px solid var(--ink-soft);
    margin-top:2px;
    cursor:pointer;
    position:relative;
    background:#fff;
  }
  .col.green .chk{border-color:var(--green);}
  .col.amber .chk{border-color:var(--amber);}
  .col.red .chk{border-color:var(--red);}
  .chk:checked{background:var(--ink-soft);}
  .col.green .chk:checked{background:var(--green);border-color:var(--green);}
  .col.amber .chk:checked{background:var(--amber);border-color:var(--amber);}
  .col.red .chk:checked{background:var(--red);border-color:var(--red);}
  .chk:checked::after{
    content:'';
    position:absolute;
    left:5px;top:1px;
    width:5px;height:10px;
    border:solid #fff;
    border-width:0 2px 2px 0;
    transform:rotate(40deg);
  }
  .item-text{
    flex:1;
    font-size:14.5px;
    line-height:1.35;
    padding-top:1px;
    outline:none;
    word-break:break-word;
  }
  .item-text.done{
    text-decoration:line-through;
    color:#9c9488;
  }
  .item-del{
    opacity:0;
    border:none;
    background:none;
    color:#B5453B;
    cursor:pointer;
    font-size:16px;
    line-height:1;
    padding:2px 4px;
    transition:opacity .15s;
  }
  .item:hover .item-del{opacity:1;}

  .add-row{
    display:flex;
    gap:8px;
    padding:10px 16px 16px;
  }
  .add-row input{
    flex:1;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    outline:none;
    background:#fff;
  }
  .add-row input:focus{border-color:var(--ink-soft);}
  .add-row button{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.05em;
    font-size:14px;
    color:#fff;
    cursor:pointer;
  }
  .col.green .add-row button{background:var(--green);}
  .col.amber .add-row button{background:var(--amber);}
  .col.red .add-row button{background:var(--red);}

  .col-foot{
    text-align:center;
    padding:8px 0 14px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .col-foot .star{color:inherit;}
  .col.green .col-foot{color:var(--green);}
  .col.amber .col-foot{color:var(--amber);}
  .col.red .col-foot{color:var(--red);}
  .col-foot .count{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:12px;
  }

  /* OBSERVACIONES */
  .obs{
    margin-top:20px;
    background:var(--ink);
    border-radius:14px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .obs-head{
    padding:12px 18px;
    color:#fff;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    font-size:15px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .obs textarea{
    width:100%;
    min-height:80px;
    border:none;
    background:var(--paper);
    padding:14px 18px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
    outline:none;
  }

  @media (max-width:860px){
    .columns{grid-template-columns:1fr;}
    .infobar{grid-template-columns:1fr;}
    .infobar .cell{border-right:none;border-bottom:1px solid var(--line);}
    .infobar .cell:last-child{border-bottom:none;}
  }

  @media print{
    body{background:#fff;padding:0;}
    .add-row,.item-del{display:none !important;}
    .wrap{max-width:100%;}
    .col,.infobar{box-shadow:none;}
  }

  /* SEDE GUARD */
  body.readonly-mode .add-row,
  body.readonly-mode .item-del{display:none !important;}
  body.readonly-mode .chk{pointer-events:none;opacity:0.55;}
  body.readonly-mode .item-text{pointer-events:none;}
</style>
</head>
<body class="checking-auth">
<div class="auth-checking" id="authChecking">Comprobando sesión...</div>
<div class="wrap">

  <div class="nav" id="nav"></div>

  <div class="readonly-banner">🔒 Modo solo lectura — tu usuario no tiene permiso para editar la producción de La Guaracha.</div>

  <div class="user-bar">
    <span id="userEmailLabel"></span>
    <button id="btnLogout">🚪 Salir</button>
  </div>

  <div class="toolbar">
    <button class="primary" id="btnShare">↗ Compartir lista</button>
    <button id="btnPrint">🖨 Imprimir</button>
    <button class="danger" id="btnReset">↺ Desmarcar todo</button>
  </div>
  <div class="status" id="status"></div>

  <div class="page-title">
    <h1>LISTA DE PRODUCCIÓN — LA GUARACHA</h1>
  </div>

  <div class="infobar">
    <div class="cell">
      <label>📅 FECHA</label>
      <div class="date-fields">
        <input type="text" maxlength="2" id="fecha-d" placeholder="DD">
        <input type="text" maxlength="2" id="fecha-m" placeholder="MM">
        <input type="text" maxlength="4" class="yr" id="fecha-y" placeholder="AAAA">
      </div>
    </div>
    <div class="cell">
      <label>🕓 TURNO</label>
      <input type="text" id="turno" placeholder="Mañana / Tarde / Noche">
    </div>
    <div class="cell">
      <label>👤 RESPONSABLE</label>
      <input type="text" id="responsable" placeholder="Nombre">
    </div>
  </div>

  <div class="columns" id="columns"></div>

  <div class="obs">
    <div class="obs-head">💬 OBSERVACIONES</div>
    <textarea id="observaciones" placeholder="Notas, incidencias, stock pendiente..."></textarea>
  </div>
</div>

<!-- Modal genérico de confirmación -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal-box">
    <div class="modal-head" id="confirmTitle">Confirmar</div>
    <div class="modal-body" id="confirmMsg"></div>
    <div class="modal-foot">
      <button class="ghost" id="confirmCancel">Cancelar</button>
      <button class="danger" id="confirmOk">Sí, continuar</button>
    </div>
  </div>
</div>

<!-- Modal de compartir -->
<div class="modal-overlay" id="shareOverlay">
  <div class="modal-box">
    <div class="modal-head">↗ Compartir lista</div>
    <div class="modal-body">
      <textarea id="shareText" readonly></textarea>
      <div class="modal-hint" id="shareHint">Selecciona el texto y cópialo, o usa el botón de copiar.</div>
    </div>
    <div class="modal-foot">
      <button class="ghost" id="shareClose">Cerrar</button>
      <button class="primary" id="shareCopy">Copiar texto</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (versión "compat", API clásica con firebase.xxx) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>

<script>
const stateDocRef = db.collection('checklist').doc('state');

const DEFAULT_STATE = {
  fecha: { d:'', m:'', y:'' },
  turno: '',
  responsable: '',
  observaciones: '',
  columns: [
    {
      id:'diario', title:'Diario', subtitle:'Se hace todos los días', theme:'green', icon:'📋',
      items:[
        'Cortar cuñas de queso','Cortar carne steak tartar','Cortar gambón tartar','Cortar atún tartar',
        'Cortar calabacín','Guacamole','Biberones','Totopos','Patatas chips','Hacer patatas carne',
        'Pochar patatas carne','Hacer patatas bravas','Pochar patatas bravas','Romanilla','Tomate mini',
        'Pepinillo mini','Payoyo mini','Queso pastrami'
      ].map(mkItem)
    },
    {
      id:'intermedio', title:'Intermedio', subtitle:'Según stock / reposición', theme:'amber', icon:'📝',
      items:[
        'Pelar y desvenar caja de gambones','Picada','Rallar queso Idiazabal','Barra Steak','Cortar cecina',
        'Picada mini burger','Cebolla encurtida','Salsa brava','Salsa tinga','Salsa pastrami',
        'Salsa mayo-bacon','Salsa vitelo','Pesto rojo','Mini burger vaca','Mini burger buey','Envasar menudo'
      ].map(mkItem)
    },
    {
      id:'elaboraciones', title:'Elaboraciones grandes', subtitle:'Preparaciones de producción', theme:'red', icon:'🍲',
      items:[
        'Ensaladilla','Crujipollo','Elaborar tinga','Envasar tinga','Carrillada','Envasar carrillada',
        'Carrillada tacos Corrala','Envasar tacos Corrala','Hacer vitelo'
      ].map(mkItem)
    }
  ]
};

function mkItem(text){
  return { id: cryptoId(), text, done:false };
}
function cryptoId(){
  return 'i-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

let state = null;
let currentUserRole = 'empleado';
let currentUserSede = 'ambos';
let saveTimer = null;
let isFirstSnapshot = true;
function canEdit(){
  return currentUserRole === 'admin' || currentUserSede === 'guaracha' || currentUserSede === 'ambos';
}

function setStatus(msg, timeout=2000){
  const el = document.getElementById('status');
  el.textContent = msg;
  if(timeout){
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.textContent=''; }, timeout);
  }
}

/* ---------- Modal de confirmación (sustituye a confirm()) ---------- */
function showConfirm(message, onConfirm){
  const overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmMsg').textContent = message;
  overlay.classList.add('open');

  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');

  function cleanup(){
    overlay.classList.remove('open');
    okBtn.removeEventListener('click', onOk);
    cancelBtn.removeEventListener('click', onCancel);
  }
  function onOk(){ cleanup(); onConfirm(); }
  function onCancel(){ cleanup(); }

  okBtn.addEventListener('click', onOk);
  cancelBtn.addEventListener('click', onCancel);
}

/* ---------- Modal de compartir (sustituye a navigator.share/clipboard) ---------- */
function showShareModal(text){
  const overlay = document.getElementById('shareOverlay');
  const textarea = document.getElementById('shareText');
  const hint = document.getElementById('shareHint');
  textarea.value = text;
  hint.textContent = 'Selecciona el texto y cópialo, o usa el botón de copiar.';
  overlay.classList.add('open');
  textarea.focus();
  textarea.select();

  async function doCopy(){
    let copied = false;
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        copied = true;
      }
    }catch(e){ /* fall through to execCommand fallback */ }

    if(!copied){
      try{
        textarea.focus();
        textarea.select();
        copied = document.execCommand('copy');
      }catch(e){ copied = false; }
    }

    if(copied){
      hint.textContent = '¡Copiado! ✓';
    } else {
      hint.textContent = 'No se pudo copiar automáticamente. El texto ya está seleccionado: usa Ctrl+C / Cmd+C.';
      textarea.focus();
      textarea.select();
    }
  }

  const copyBtn = document.getElementById('shareCopy');
  const closeBtn = document.getElementById('shareClose');

  function cleanup(){
    overlay.classList.remove('open');
    copyBtn.removeEventListener('click', doCopy);
    closeBtn.removeEventListener('click', onClose);
  }
  function onClose(){ cleanup(); }

  copyBtn.addEventListener('click', doCopy);
  closeBtn.addEventListener('click', onClose);
}

/* ---------- Firebase: sincronización en tiempo real (requiere sesión ya iniciada) ---------- */
async function initFirebase(){
  setStatus('Conectando...', 0);

  stateDocRef.onSnapshot((snap)=>{
    if(snap.metadata.hasPendingWrites){
      return;
    }

    if(snap.exists){
      const data = snap.data();
      state = data;
      if(!state.columns) state.columns = DEFAULT_STATE.columns;
      if(!state.fecha) state.fecha = {d:'',m:'',y:''};
    } else if(isFirstSnapshot){
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      stateDocRef.set(state).catch(err=>console.error(err));
    }
    isFirstSnapshot = false;
    render();
    setStatus('Sincronizado ✓');
  }, (err)=>{
    console.error(err);
    setStatus('Error de conexión con Firebase', 5000);
  });
}

function queueSave(){
  setStatus('Guardando...', 0);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await stateDocRef.set(state);
      setStatus('Guardado ✓');
    }catch(e){
      console.error(e);
      setStatus('No se pudo guardar (sin conexión)');
    }
  }, 400);
}

function render(){
  document.getElementById('fecha-d').value = state.fecha.d || '';
  document.getElementById('fecha-m').value = state.fecha.m || '';
  document.getElementById('fecha-y').value = state.fecha.y || '';
  document.getElementById('turno').value = state.turno || '';
  document.getElementById('responsable').value = state.responsable || '';
  document.getElementById('observaciones').value = state.observaciones || '';

  const container = document.getElementById('columns');
  container.innerHTML = '';
  state.columns.forEach(col=>{
    const colEl = document.createElement('div');
    colEl.className = `col ${col.theme}`;

    const done = col.items.filter(i=>i.done).length;
    colEl.innerHTML = `
      <div class="col-head">
        <h2>${escapeHtml(col.icon)} ${escapeHtml(col.title)}</h2>
        <p>${escapeHtml(col.subtitle)}</p>
      </div>
      <div class="items" data-col="${col.id}"></div>
      <div class="add-row" data-col="${col.id}">
        <input type="text" placeholder="Añadir tarea..." data-newitem="${col.id}">
        <button data-addbtn="${col.id}">Añadir</button>
      </div>
      <div class="col-foot">
        <span class="count">${done}/${col.items.length} COMPLETADO</span><br>
        <span class="star">★</span>
      </div>
    `;
    container.appendChild(colEl);

    const itemsEl = colEl.querySelector('.items');
    col.items.forEach(item=>{
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `
        <input type="checkbox" class="chk" ${item.done?'checked':''}>
        <div class="item-text ${item.done?'done':''}" contenteditable="true" spellcheck="false">${escapeHtml(item.text)}</div>
        <button class="item-del" title="Eliminar">✕</button>
      `;
      const chk = row.querySelector('.chk');
      const textEl = row.querySelector('.item-text');
      const delBtn = row.querySelector('.item-del');

      chk.addEventListener('change', ()=>{
        if(!canEdit()) return;
        item.done = chk.checked;
        textEl.classList.toggle('done', item.done);
        updateFoot(col, colEl);
        queueSave();
      });
      textEl.addEventListener('blur', ()=>{
        if(!canEdit()) return;
        const newText = textEl.textContent.trim();
        if(newText.length===0){ textEl.textContent = item.text; return; }
        item.text = newText;
        queueSave();
      });
      textEl.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){ e.preventDefault(); textEl.blur(); }
      });
      delBtn.addEventListener('click', ()=>{
        if(!canEdit()) return;
        col.items = col.items.filter(i=>i.id!==item.id);
        render();
        queueSave();
      });

      itemsEl.appendChild(row);
    });

    const addInput = colEl.querySelector(`[data-newitem="${col.id}"]`);
    const addBtn = colEl.querySelector(`[data-addbtn="${col.id}"]`);
    function addItem(){
      if(!canEdit()) return;
      const v = addInput.value.trim();
      if(!v) return;
      col.items.push(mkItem(v));
      addInput.value='';
      render();
      queueSave();
    }
    addBtn.addEventListener('click', addItem);
    addInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); addItem(); } });
  });
}

function updateFoot(col, colEl){
  const done = col.items.filter(i=>i.done).length;
  colEl.querySelector('.count').textContent = `${done}/${col.items.length} COMPLETADO`;
}

// header field bindings
['fecha-d','fecha-m','fecha-y'].forEach(id=>{
  document.getElementById(id).addEventListener('input', (e)=>{
    const key = id.split('-')[1];
    state.fecha[key] = e.target.value.replace(/[^0-9]/g,'');
    e.target.value = state.fecha[key];
    queueSave();
  });
});
document.getElementById('turno').addEventListener('input', e=>{ state.turno = e.target.value; queueSave(); });
document.getElementById('responsable').addEventListener('input', e=>{ state.responsable = e.target.value; queueSave(); });
document.getElementById('observaciones').addEventListener('input', e=>{ state.observaciones = e.target.value; queueSave(); });

document.getElementById('btnReset').addEventListener('click', ()=>{
  if(!canEdit()) return;
  showConfirm('¿Desmarcar todas las tareas completadas?', ()=>{
    state.columns.forEach(col=> col.items.forEach(i=> i.done=false));
    render();
    queueSave();
    setStatus('Todas las tareas desmarcadas ✓');
  });
});

document.getElementById('btnPrint').addEventListener('click', ()=> window.print());

document.getElementById('btnShare').addEventListener('click', ()=>{
  const lines = [];
  lines.push('LISTA DE PRODUCCIÓN — LA GUARACHA');
  lines.push(`Fecha: ${state.fecha.d||'__'}/${state.fecha.m||'__'}/${state.fecha.y||'____'}    Turno: ${state.turno||'-'}    Responsable: ${state.responsable||'-'}`);
  lines.push('');
  state.columns.forEach(col=>{
    const marcados = col.items.filter(i=> i.done);
    if(!marcados.length) return;
    lines.push(`${col.title.toUpperCase()} (${col.subtitle})`);
    marcados.forEach(i=> lines.push(`  - ${i.text}`));
    lines.push('');
  });
  if(state.observaciones){
    lines.push('OBSERVACIONES:');
    lines.push(state.observaciones);
  }
  const text = lines.join('\n');
  showShareModal(text);
});

/* ---------- Guard de sesión + menú ---------- */
renderNav('produccion-guaracha.html');
initAuthGuard({
  onReady: ({ role, sede })=>{
    currentUserRole = role;
    currentUserSede = sede;
    if(!canEdit()){
      document.body.classList.add('readonly-mode');
    }
    initFirebase();
  }
});
</script>
</body>
</html>
