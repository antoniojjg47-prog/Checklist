<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Guaracha · Checklist de cocina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F2EA;
    --paper:#FCFAF6;
    --ink:#241F1B;
    --ink-soft:#5A5249;
    --green:#1F4B3B;
    --green-soft:#E7EFE9;
    --amber:#C98A1F;
    --amber-soft:#FBF0DD;
    --red:#8F2A2A;
    --red-soft:#F7E9E7;
    --line:#DCD4C6;
    --shadow: 0 1px 2px rgba(36,31,27,0.06), 0 8px 24px rgba(36,31,27,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:24px 16px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* HEADER */
  .brand{
    text-align:center;
    padding:8px 0 20px;
    position:relative;
  }
  .brand .eyebrow{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.35em;
    font-size:15px;
    color:var(--ink-soft);
  }
  .brand h1{
    font-family:'Dancing Script',cursive;
    font-weight:700;
    font-size:64px;
    margin:2px 0 6px;
    color:var(--ink);
    line-height:1;
  }
  .brand .est{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.3em;
    font-size:13px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .brand .est::before,.brand .est::after{
    content:'';
    height:1px;
    width:60px;
    background:var(--line);
  }

  /* NAV */
  .nav{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:6px;
  }
  .nav a{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    font-size:13px;
    text-decoration:none;
    color:var(--ink-soft);
    border:1px solid var(--line);
    background:var(--paper);
    padding:7px 14px;
    border-radius:999px;
  }
  .nav a.active{background:var(--green);color:#fff;border-color:var(--green);}

  /* INFO BAR */
  .infobar{
    display:grid;
    grid-template-columns:1.1fr 1fr 1.2fr;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:22px;
  }
  .infobar .cell{
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    border-right:1px solid var(--line);
  }
  .infobar .cell:last-child{border-right:none;}
  .infobar label{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    font-size:14px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .infobar input{
    border:none;
    border-bottom:1px solid var(--line);
    background:transparent;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    padding:4px 2px;
    width:100%;
    outline:none;
  }
  .infobar input:focus{border-bottom-color:var(--ink);}
  .date-fields{display:flex;gap:6px;}
  .date-fields input{width:44px;text-align:center;}
  .date-fields input.yr{width:64px;}

  /* COLUMNS */
  .columns{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
  }
  .col{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .col-head{
    padding:16px 18px 14px;
    color:#fff;
  }
  .col.green .col-head{background:var(--green);}
  .col.amber .col-head{background:var(--amber);}
  .col.red .col-head{background:var(--red);}
  .col-head h2{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.04em;
    font-size:24px;
    margin:0 0 3px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .col-head p{
    margin:0;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    opacity:0.88;
    font-weight:600;
  }
  .items{
    padding:10px 16px 6px;
    flex:1;
  }
  .item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    position:relative;
  }
  .item:last-child{border-bottom:none;}
  .chk{
    appearance:none;
    -webkit-appearance:none;
    width:19px;
    height:19px;
    min-width:19px;
    border-radius:4px;
    border:2px solid var(--ink-soft);
    margin-top:2px;
    cursor:pointer;
    position:relative;
    background:#fff;
  }
  .col.green .chk{border-color:var(--green);}
  .col.amber .chk{border-color:var(--amber);}
  .col.red .chk{border-color:var(--red);}
  .chk:checked{background:var(--ink-soft);}
  .col.green .chk:checked{background:var(--green);border-color:var(--green);}
  .col.amber .chk:checked{background:var(--amber);border-color:var(--amber);}
  .col.red .chk:checked{background:var(--red);border-color:var(--red);}
  .chk:checked::after{
    content:'';
    position:absolute;
    left:5px;top:1px;
    width:5px;height:10px;
    border:solid #fff;
    border-width:0 2px 2px 0;
    transform:rotate(40deg);
  }
  .item-text{
    flex:1;
    font-size:14.5px;
    line-height:1.35;
    padding-top:1px;
    outline:none;
    word-break:break-word;
  }
  .item-text.done{
    text-decoration:line-through;
    color:#9c9488;
  }
  .item-del{
    opacity:0;
    border:none;
    background:none;
    color:#B5453B;
    cursor:pointer;
    font-size:16px;
    line-height:1;
    padding:2px 4px;
    transition:opacity .15s;
  }
  .item:hover .item-del{opacity:1;}

  .add-row{
    display:flex;
    gap:8px;
    padding:10px 16px 16px;
  }
  .add-row input{
    flex:1;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    outline:none;
    background:#fff;
  }
  .add-row input:focus{border-color:var(--ink-soft);}
  .add-row button{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.05em;
    font-size:14px;
    color:#fff;
    cursor:pointer;
  }
  .col.green .add-row button{background:var(--green);}
  .col.amber .add-row button{background:var(--amber);}
  .col.red .add-row button{background:var(--red);}

  .col-foot{
    text-align:center;
    padding:8px 0 14px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .col-foot .star{color:inherit;}
  .col.green .col-foot{color:var(--green);}
  .col.amber .col-foot{color:var(--amber);}
  .col.red .col-foot{color:var(--red);}
  .col-foot .count{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:12px;
  }

  /* OBSERVACIONES */
  .obs{
    margin-top:20px;
    background:var(--ink);
    border-radius:14px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .obs-head{
    padding:12px 18px;
    color:#fff;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    font-size:15px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .obs textarea{
    width:100%;
    min-height:80px;
    border:none;
    background:var(--paper);
    padding:14px 18px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
    outline:none;
  }

  /* TOOLBAR */
  .toolbar{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:18px;
    padding:10px 0;
  }
  .toolbar button{
    display:flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .1s ease;
  }
  .toolbar button:hover{transform:translateY(-1px);}
  .toolbar button.primary{background:var(--green);color:#fff;border-color:var(--green);}
  .toolbar button.danger{color:var(--red);}
  .status{
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:8px;
    min-height:14px;
  }

  .footer-brand{
    text-align:center;
    margin-top:34px;
    color:var(--ink-soft);
  }
  .footer-brand .line{
    display:flex;align-items:center;justify-content:center;gap:16px;
  }
  .footer-brand .line::before,.footer-brand .line::after{
    content:'';height:1px;width:100px;background:var(--line);
  }
  .footer-brand small{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.3em;
    font-size:11px;
  }
  .footer-brand .script{
    font-family:'Dancing Script',cursive;
    font-size:28px;
    font-weight:700;
    color:var(--ink);
    margin:4px 0;
  }

  /* MODAL (reemplaza confirm()/alert()/clipboard nativos) */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(36,31,27,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:14px;
    max-width:520px;
    width:100%;
    max-height:80vh;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    overflow:hidden;
  }
  .modal-head{
    padding:16px 20px;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.06em;
    font-size:17px;
    background:var(--ink);
    color:#fff;
  }
  .modal-body{
    padding:18px 20px;
    font-size:14px;
    color:var(--ink);
    overflow-y:auto;
  }
  .modal-body textarea{
    width:100%;
    min-height:220px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
    font-family:'Inter',monospace;
    font-size:12.5px;
    line-height:1.5;
    resize:vertical;
    background:#fff;
    color:var(--ink);
  }
  .modal-foot{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:14px 20px;
    border-top:1px solid var(--line);
  }
  .modal-foot button{
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .modal-foot button.ghost{background:transparent;color:var(--ink-soft);}
  .modal-foot button.primary{background:var(--green);color:#fff;}
  .modal-foot button.danger{background:var(--red);color:#fff;}
  .modal-hint{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:8px;
  }

  @media (max-width:860px){
    .columns{grid-template-columns:1fr;}
    .infobar{grid-template-columns:1fr;}
    .infobar .cell{border-right:none;border-bottom:1px solid var(--line);}
    .infobar .cell:last-child{border-bottom:none;}
    .brand h1{font-size:48px;}
  }

  @media print{
    body{background:#fff;padding:0;}
    .toolbar,.status,.add-row,.item-del,.modal-overlay,.nav,.user-bar{display:none !important;}
    .wrap{max-width:100%;}
    .col,.infobar{box-shadow:none;}
  }

  /* AUTH GUARD */
  .auth-checking{
    display:none;
    min-height:100vh;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-size:15px;
  }
  body.checking-auth .auth-checking{display:flex;}
  body.checking-auth .wrap{display:none;}
  .user-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
    font-size:12px;
    color:var(--ink-soft);
  }
  .user-bar button{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;
    font-size:12px;
    padding:4px 10px;
    border-radius:999px;
    cursor:pointer;
  }
  .user-bar button:hover{background:var(--red-soft);color:var(--red);border-color:var(--red);}
</style>

<script>

const auth = firebase.auth();
const db = firebase.firestore();
const stateDocRef = db.collection('checklist').doc('state');

const DEFAULT_STATE = {
  fecha: { d:'', m:'', y:'' },
  turno: '',
  responsable: '',
  observaciones: '',
  columns: [
    {
      id:'diario', title:'Diario', subtitle:'Se hace todos los días', theme:'green', icon:'📋',
      items:[
        'Cortar cuñas de queso','Cortar carne steak tartar','Cortar gambón tartar','Cortar atún tartar',
        'Cortar calabacín','Guacamole','Biberones','Totopos','Patatas chips','Hacer patatas carne',
        'Pochar patatas carne','Hacer patatas bravas','Pochar patatas bravas','Romanilla','Tomate mini',
        'Pepinillo mini','Payoyo mini','Queso pastrami'
      ].map(mkItem)
    },
    {
      id:'intermedio', title:'Intermedio', subtitle:'Según stock / reposición', theme:'amber', icon:'📝',
      items:[
        'Pelar y desvenar caja de gambones','Picada','Rallar queso Idiazabal','Barra Steak','Cortar cecina',
        'Picada mini burger','Cebolla encurtida','Salsa brava','Salsa tinga','Salsa pastrami',

      ].map(mkItem)
    },
    {
      id:'elaboraciones', title:'Elaboraciones grandes', subtitle:'Preparaciones de producción', theme:'red', icon:'🍲',
      items:[
        'Ensaladilla','Crujipollo','Elaborar tinga','Envasar tinga','Carrillada','Envasar carrillada',
        'Carrillada tacos Corrala','Envasar tacos Corrala','Hacer vitelo'
      ].map(mkItem)
    }
  ]
};

function mkItem(text){
  return { id: cryptoId(), text, done:false };
}
function cryptoId(){
  return 'i-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

let state = null;
let saveTimer = null;
let isFirstSnapshot = true;

function setStatus(msg, timeout=2000){
  const el = document.getElementById('status');
  el.textContent = msg;
  if(timeout){
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.textContent=''; }, timeout);
  }
}

/* ---------- Modal de confirmación (sustituye a confirm()) ---------- */
function showConfirm(message, onConfirm){
  const overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmMsg').textContent = message;
  overlay.classList.add('open');

  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');

  function cleanup(){
    overlay.classList.remove('open');
    okBtn.removeEventListener('click', onOk);
    cancelBtn.removeEventListener('click', onCancel);
  }
  function onOk(){ cleanup(); onConfirm(); }
  function onCancel(){ cleanup(); }

  okBtn.addEventListener('click', onOk);
  cancelBtn.addEventListener('click', onCancel);
}

/* ---------- Modal de compartir (sustituye a navigator.share/clipboard) ---------- */
function showShareModal(text){
  const overlay = document.getElementById('shareOverlay');
  const textarea = document.getElementById('shareText');
  const hint = document.getElementById('shareHint');
  textarea.value = text;
  hint.textContent = 'Selecciona el texto y cópialo, o usa el botón de copiar.';
  overlay.classList.add('open');
  textarea.focus();
  textarea.select();

  async function doCopy(){
    let copied = false;
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        copied = true;
      }
    }catch(e){ /* fall through to execCommand fallback */ }

    if(!copied){
      try{
        textarea.focus();
        textarea.select();
        copied = document.execCommand('copy');
      }catch(e){ copied = false; }
    }

    if(copied){
      hint.textContent = '¡Copiado! ✓';
    } else {
      hint.textContent = 'No se pudo copiar automáticamente. El texto ya está seleccionado: usa Ctrl+C / Cmd+C.';
      textarea.focus();
      textarea.select();
    }
  }

  const copyBtn = document.getElementById('shareCopy');
  const closeBtn = document.getElementById('shareClose');

  function cleanup(){
    overlay.classList.remove('open');
    copyBtn.removeEventListener('click', doCopy);
    closeBtn.removeEventListener('click', onClose);
  }
  function onClose(){ cleanup(); }

  copyBtn.addEventListener('click', doCopy);
  closeBtn.addEventListener('click', onClose);
}

/* ---------- Firebase: sincronización en tiempo real (requiere sesión ya iniciada) ---------- */
async function initFirebase(){
  setStatus('Conectando...', 0);

  stateDocRef.onSnapshot((snap)=>{
    // Si el cambio es nuestra propia escritura optimista (aún no confirmada por el
    // servidor), lo ignoramos: la pantalla ya refleja ese cambio localmente y
    // re-renderizar aquí interrumpiría al usuario si está escribiendo algo.
    if(snap.metadata.hasPendingWrites){
      return;
    }

    if(snap.exists){
      const data = snap.data();
      state = data;
      if(!state.columns) state.columns = DEFAULT_STATE.columns;
      if(!state.fecha) state.fecha = {d:'',m:'',y:''};
    } else if(isFirstSnapshot){
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      stateDocRef.set(state).catch(err=>console.error(err));
    }
    isFirstSnapshot = false;
    render();
    setStatus('Sincronizado ✓');
  }, (err)=>{
    console.error(err);
    setStatus('Error de conexión con Firebase', 5000);
  });
}

function queueSave(){
  setStatus('Guardando...', 0);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await stateDocRef.set(state);
      setStatus('Guardado ✓');
    }catch(e){
      console.error(e);
      setStatus('No se pudo guardar (sin conexión)');
    }
  }, 400);
}

function render(){
  document.getElementById('fecha-d').value = state.fecha.d || '';
  document.getElementById('fecha-m').value = state.fecha.m || '';
  document.getElementById('fecha-y').value = state.fecha.y || '';
  document.getElementById('turno').value = state.turno || '';
  document.getElementById('responsable').value = state.responsable || '';
  document.getElementById('observaciones').value = state.observaciones || '';

  const container = document.getElementById('columns');
  container.innerHTML = '';
  state.columns.forEach(col=>{
    const colEl = document.createElement('div');
    colEl.className = `col ${col.theme}`;

    const done = col.items.filter(i=>i.done).length;
    colEl.innerHTML = `
      <div class="col-head">
        <h2>${escapeHtml(col.icon)} ${escapeHtml(col.title)}</h2>
        <p>${escapeHtml(col.subtitle)}</p>
      </div>
      <div class="items" data-col="${col.id}"></div>
      <div class="add-row" data-col="${col.id}">
        <input type="text" placeholder="Añadir tarea..." data-newitem="${col.id}">
        <button data-addbtn="${col.id}">Añadir</button>
      </div>
      <div class="col-foot">
        <span class="count">${done}/${col.items.length} COMPLETADO</span><br>
        <span class="star">★</span>
      </div>
    `;
    container.appendChild(colEl);

    const itemsEl = colEl.querySelector('.items');
    col.items.forEach(item=>{
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `
        <input type="checkbox" class="chk" ${item.done?'checked':''}>
        <div class="item-text ${item.done?'done':''}" contenteditable="true" spellcheck="false">${escapeHtml(item.text)}</div>
        <button class="item-del" title="Eliminar">✕</button>
      `;
      const chk = row.querySelector('.chk');
      const textEl = row.querySelector('.item-text');
      const delBtn = row.querySelector('.item-del');

      chk.addEventListener('change', ()=>{
        item.done = chk.checked;
        textEl.classList.toggle('done', item.done);
        updateFoot(col, colEl);
        queueSave();
      });
      textEl.addEventListener('blur', ()=>{
        const newText = textEl.textContent.trim();
        if(newText.length===0){ textEl.textContent = item.text; return; }
        item.text = newText;
        queueSave();
      });
      textEl.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){ e.preventDefault(); textEl.blur(); }
      });
      delBtn.addEventListener('click', ()=>{
        col.items = col.items.filter(i=>i.id!==item.id);
        render();
        queueSave();
      });

      itemsEl.appendChild(row);
    });

    const addInput = colEl.querySelector(`[data-newitem="${col.id}"]`);
    const addBtn = colEl.querySelector(`[data-addbtn="${col.id}"]`);
    function addItem(){
      const v = addInput.value.trim();
      if(!v) return;
      col.items.push(mkItem(v));
      addInput.value='';
      render();
      queueSave();
    }
    addBtn.addEventListener('click', addItem);
    addInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); addItem(); } });
  });
}

function updateFoot(col, colEl){
  const done = col.items.filter(i=>i.done).length;
  colEl.querySelector('.count').textContent = `${done}/${col.items.length} COMPLETADO`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// header field bindings
['fecha-d','fecha-m','fecha-y'].forEach(id=>{
  document.getElementById(id).addEventListener('input', (e)=>{
    const key = id.split('-')[1];
    state.fecha[key] = e.target.value.replace(/[^0-9]/g,'');
    e.target.value = state.fecha[key];
    queueSave();
  });
});
document.getElementById('turno').addEventListener('input', e=>{ state.turno = e.target.value; queueSave(); });
document.getElementById('responsable').addEventListener('input', e=>{ state.responsable = e.target.value; queueSave(); });
document.getElementById('observaciones').addEventListener('input', e=>{ state.observaciones = e.target.value; queueSave(); });

document.getElementById('btnReset').addEventListener('click', ()=>{
  showConfirm('¿Desmarcar todas las tareas completadas?', ()=>{
    state.columns.forEach(col=> col.items.forEach(i=> i.done=false));
    render();
    queueSave();
    setStatus('Todas las tareas desmarcadas ✓');
  });
});

document.getElementById('btnPrint').addEventListener('click', ()=> window.print());

document.getElementById('btnShare').addEventListener('click', ()=>{
  const lines = [];
  lines.push('BAR RESTAURANTE — LA GUARACHA');
  lines.push(`Fecha: ${state.fecha.d||'__'}/${state.fecha.m||'__'}/${state.fecha.y||'____'}    Turno: ${state.turno||'-'}    Responsable: ${state.responsable||'-'}`);
  lines.push('');
  state.columns.forEach(col=>{
    lines.push(`${col.title.toUpperCase()} (${col.subtitle})`);
    col.items.forEach(i=> lines.push(`  [${i.done?'x':' '}] ${i.text}`));
    lines.push('');
  });
  if(state.observaciones){
    lines.push('OBSERVACIONES:');
    lines.push(state.observaciones);
  }
  const text = lines.join('\n');
  showShareModal(text);
});

/* ---------- Guard de sesión: exige login con usuario activo antes de cargar la app ---------- */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    window.location.href = 'login.html';
    return;
  }
  try{
    const snap = await db.collection('usuarios').doc(user.uid).get();
    if(!snap.exists || snap.data().activo !== true){
      await auth.signOut();
      window.location.href = 'login.html';
      return;
    }
    document.getElementById('userEmailLabel').textContent = user.email || '';
    document.body.classList.remove('checking-auth');
    initFirebase();
  }catch(e){
    console.error(e);
    window.location.href = 'login.html';
  }
});

document.getElementById('btnLogout').addEventListener('click', async ()=>{
  await auth.signOut();
  window.location.href = 'login.html';
});
</script>
